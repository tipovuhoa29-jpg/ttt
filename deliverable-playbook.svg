<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A2E6B" />
      <stop offset="100%" stop-color="#2A1847" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F66" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#purpleGrad)" opacity="0.04" />
  
  <!-- Back Pages -->
  <rect x="28" y="16" width="48" height="60" rx="3" fill="#E5E5E5" opacity="0.7" />
  <rect x="25" y="20" width="48" height="60" rx="3" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5" />
  
  <!-- Book Cover -->
  <rect x="20" y="24" width="48" height="60" rx="4" fill="url(#purpleGrad)" stroke="url(#purpleGrad)" stroke-width="1" />
  
  <!-- Spine Line -->
  <line x1="24" y1="24" x2="24" y2="84" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
  
  <!-- Playbook Emblem on cover -->
  <rect x="32" y="38" width="24" height="30" rx="2" fill="none" stroke="url(#orangeGrad)" stroke-width="2.5" />
  <line x1="38" y1="45" x2="50" y2="45" stroke="url(#orangeGrad)" stroke-width="2" stroke-linecap="round" />
  <line x1="38" y1="52" x2="50" y2="52" stroke="url(#orangeGrad)" stroke-width="2" stroke-linecap="round" />
  <line x1="38" y1="59" x2="45" y2="59" stroke="url(#orangeGrad)" stroke-width="2" stroke-linecap="round" />
</svg>
