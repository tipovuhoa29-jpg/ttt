  <path d="M100,30 C85,30 75,40 75,55 C70,55 65,60 65,70 C65,80 72,85 75,85 C70,90 70,100 80,105 C90,110 100,105 100,95 C100,105 110,110 120,105 C125,102 128,95 125,85" fill="none" stroke="url(#purpleGrad)" stroke-width="4" stroke-linecap="round" />
