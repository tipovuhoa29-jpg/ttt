<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A2E6B" />
      <stop offset="100%" stop-color="#2A1847" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F66" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="80" fill="url(#purpleGrad)" opacity="0.05" />
  <!-- Infinite Loop / Flow Diagram -->
  <path d="M60,100 C60,75 80,60 100,60 C120,60 140,75 140,100 C140,125 120,140 100,140 C80,140 60,125 60,100 Z" fill="none" stroke="url(#purpleGrad)" stroke-width="4" stroke-linecap="round" />
  <path d="M100,60 C130,60 150,80 150,100 C150,120 130,140 100,140" fill="none" stroke="url(#orangeGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="100" stroke-dashoffset="0" />
  <!-- Sparkles/Arrows/Nodes along flow -->
  <circle cx="60" cy="100" r="8" fill="url(#purpleGrad)" />
  <circle cx="140" cy="100" r="8" fill="url(#orangeGrad)" />
  <!-- Arrow Heads -->
  <path d="M105,55 L115,60 L105,65" fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M95,145 L85,140 L95,135" fill="none" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Core target -->
  <circle cx="100" cy="100" r="16" fill="url(#purpleGrad)" opacity="0.1" />
  <path d="M92,100 L98,105 L108,95" fill="none" stroke="url(#orangeGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
