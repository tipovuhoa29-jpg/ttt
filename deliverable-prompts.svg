<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A2E6B" />
      <stop offset="100%" stop-color="#2A1847" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F66" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#purpleGrad)" opacity="0.04" />
  
  <!-- Terminal Window -->
  <rect x="15" y="20" width="70" height="56" rx="6" fill="#FFFFFF" stroke="url(#purpleGrad)" stroke-width="3" />
  <path d="M15,35 L85,35" stroke="url(#purpleGrad)" stroke-width="2" />
  
  <!-- Window buttons -->
  <circle cx="23" cy="27" r="3" fill="url(#purpleGrad)" />
  <circle cx="31" cy="27" r="3" fill="url(#purpleGrad)" opacity="0.5" />
  <circle cx="39" cy="27" r="3" fill="url(#purpleGrad)" opacity="0.2" />
  
  <!-- Prompt Symbol >_ -->
  <path d="M25,47 L32,52 L25,57" fill="none" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="36" y1="57" x2="48" y2="57" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" />
  
  <!-- AI Sparkles -->
  <g transform="translate(62, 50)">
    <polygon points="12,0 8,4 8,12 4,12 0,16 4,16 4,24 8,20 8,12 16,12" fill="url(#orangeGrad)" transform="scale(0.8)" />
  </g>
</svg>
