<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A2E6B" />
      <stop offset="100%" stop-color="#2A1847" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="75" r="60" fill="url(#purpleGrad)" opacity="0.03" />
  
  <!-- Left Side: Single Expert -->
  <g transform="translate(25, 55)">
    <circle cx="20" cy="15" r="10" fill="none" stroke="url(#purpleGrad)" stroke-width="3" />
    <path d="M5,35 C5,25 10,25 20,25 C30,25 35,25 35,35" fill="none" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Barrier Line & Red X Mark -->
  <line x1="85" y1="35" x2="85" y2="115" stroke="#E5E5E5" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M80,70 L90,80 M90,70 L80,80" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" />
  
  <!-- Right Side: Crowd of People -->
  <g transform="translate(105, 30)" opacity="0.5">
    <!-- Person 1 -->
    <circle cx="20" cy="15" r="7" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    <path d="M8,30 C8,22 12,22 20,22 C28,22 32,22 32,30" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    
    <!-- Person 2 -->
    <circle cx="50" cy="20" r="7" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    <path d="M38,35 C38,27 42,27 50,27 C58,27 62,27 62,35" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    
    <!-- Person 3 -->
    <circle cx="25" cy="65" r="7" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    <path d="M13,80 C13,72 17,72 25,72 C33,72 37,72 37,80" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    
    <!-- Person 4 -->
    <circle cx="55" cy="60" r="7" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
    <path d="M43,75 C43,67 47,67 55,67 C63,67 67,67 67,75" fill="none" stroke="url(#purpleGrad)" stroke-width="2" />
  </g>
</svg>
