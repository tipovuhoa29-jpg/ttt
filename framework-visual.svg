<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A2E6B" />
      <stop offset="100%" stop-color="#2A1847" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F66" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#2A1847" flood-opacity="0.06" />
    </filter>
  </defs>

  <!-- Connection line back -->
  <path d="M180,150 L820,150" fill="none" stroke="#E5E5E5" stroke-width="4" stroke-dasharray="8,6" />
  
  <!-- Connecting Arrow 1 -->
  <g transform="translate(320, 135)">
    <path d="M0,15 L60,15 M45,5 L60,15 L45,25" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Connecting Arrow 2 -->
  <g transform="translate(620, 135)">
    <path d="M0,15 L60,15 M45,5 L60,15 L45,25" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Step 1 Card -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <rect width="240" height="200" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" />
    <circle cx="120" cy="55" r="30" fill="url(#purpleGrad)" opacity="0.05" />
    <!-- Book Icon -->
    <path d="M108,45 L116,42 L132,47 L132,65 L116,60 L108,63 Z" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M108,45 L108,63" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round" />
    <text x="120" y="125" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="18" font-weight="700" fill="#2A1847">01 — Andragogy</text>
    <text x="120" y="150" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="13" fill="#525252">Adult Learning Principles</text>
    <text x="120" y="168" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="13" fill="#525252">No boring theoretical lectures</text>
  </g>

  <!-- Step 2 Card (Featured Orange Accent) -->
  <g transform="translate(380, 50)" filter="url(#shadow)">
    <rect width="240" height="200" rx="16" fill="#FFFFFF" stroke="#FF6B35" stroke-width="2" />
    <circle cx="120" cy="55" r="30" fill="url(#orangeGrad)" opacity="0.08" />
    <!-- Lightning/Zap Icon -->
    <polygon points="122,35 107,55 120,55 118,75 133,55 120,55" fill="none" stroke="url(#orangeGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="120" y="125" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="18" font-weight="700" fill="#2A1847">02 — Claude AI</text>
    <text x="120" y="150" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="13" fill="#525252">150+ Prompts Workspace</text>
    <text x="120" y="168" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="13" fill="#525252">Build outlines in 2 hours</text>
  </g>

  <!-- Step 3 Card -->
  <g transform="translate(720, 50)" filter="url(#shadow)">
    <rect width="240" height="200" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" />
    <circle cx="120" cy="55" r="30" fill="url(#purpleGrad)" opacity="0.05" />
    <!-- Target Icon -->
    <circle cx="120" cy="55" r="15" fill="none" stroke="url(#purpleGrad)" stroke-width="2.5" />
    <circle cx="120" cy="55" r="6" fill="url(#purpleGrad)" />
    <text x="120" y="125" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="18" font-weight="700" fill="#2A1847">03 — Micro-Loop</text>
    <text x="120" y="150" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="13" fill="#525252">15-Min Teaching Trials</text>
    <text x="120" y="168" text-anchor="middle" font-family="'Be Vietnam Pro', sans-serif" font-size="13" fill="#525252">Professional Rubric & Feedback</text>
  </g>
</svg>
