<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A2E6B" />
      <stop offset="100%" stop-color="#2A1847" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8F66" />
      <stop offset="100%" stop-color="#FF6B35" />
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="50" cy="50" r="40" fill="url(#purpleGrad)" opacity="0.04" />
  
  <!-- Doc 1 (Back) -->
  <g transform="translate(18, 15)" opacity="0.6">
    <rect width="45" height="60" rx="4" fill="#FFFFFF" stroke="url(#purpleGrad)" stroke-width="2.5" />
    <line x1="8" y1="15" x2="37" y2="15" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round" />
    <line x1="8" y1="28" x2="37" y2="28" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round" />
    <line x1="8" y1="41" x2="25" y2="41" stroke="url(#purpleGrad)" stroke-width="2.5" stroke-linecap="round" />
  </g>
  
  <!-- Doc 2 (Front) -->
  <g transform="translate(36, 27)">
    <rect width="45" height="60" rx="4" fill="#FFFFFF" stroke="url(#purpleGrad)" stroke-width="3" />
    <line x1="8" y1="15" x2="37" y2="15" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="8" y1="28" x2="37" y2="28" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="8" y1="41" x2="25" y2="41" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round" />
    
    <!-- Success Checkmark Badge on front doc -->
    <circle cx="37" cy="45" r="9" fill="url(#orangeGrad)" />
    <path d="M33,45 L36,48 L42,42" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
